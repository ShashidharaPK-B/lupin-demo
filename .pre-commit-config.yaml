repos:
  # Secret scanning — detect accidentally committed secrets
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # Backend — Python linting & formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [check, --fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # Frontend — ESLint
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: bash -c 'cd frontend && npx eslint src --max-warnings 0'
        language: system
        files: ^frontend/src/.*\.(ts|tsx)$
        pass_filenames: false
