name: CD

on:
  push:
    branches:
      - main

concurrency:
  group: cd-${{ github.sha }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  PROD_PROJECT: lupin-prod   # docker compose project name for production
  DEV_PROJECT: lupin-demo    # docker compose project name for local dev

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/backend
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/frontend
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL || '' }}
            VITE_APP_NAME=AI Should Cost Engine

      - name: Summary
        run: |
          echo "## Docker Images Published" >> $GITHUB_STEP_SUMMARY
          echo "**Backend:** ${{ env.REGISTRY }}/${{ github.repository }}/backend:sha-${GITHUB_SHA::7}" >> $GITHUB_STEP_SUMMARY
          echo "**Frontend:** ${{ env.REGISTRY }}/${{ github.repository }}/frontend:sha-${GITHUB_SHA::7}" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

  deploy:
    name: Deploy to Self-Hosted Runner
    needs: build-and-push
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write .env file
        run: printf '%s' "${{ secrets.ENV_FILE }}" > .env

      - name: Scale down local dev stack (free ports)
        run: |
          docker compose -p ${{ env.DEV_PROJECT }} down --remove-orphans 2>/dev/null || true
          docker compose -p ${{ env.PROD_PROJECT }} -f docker-compose.prod.yml down --remove-orphans 2>/dev/null || true

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull latest images
        run: |
          docker pull ${{ env.REGISTRY }}/${{ github.repository }}/backend:latest
          docker pull ${{ env.REGISTRY }}/${{ github.repository }}/frontend:latest

      - name: Deploy with Docker Compose
        env:
          BACKEND_IMAGE: ${{ env.REGISTRY }}/${{ github.repository }}/backend:latest
          FRONTEND_IMAGE: ${{ env.REGISTRY }}/${{ github.repository }}/frontend:latest
        run: docker compose -p ${{ env.PROD_PROJECT }} -f docker-compose.prod.yml up -d --remove-orphans

      - name: Run database migrations
        run: docker compose -p ${{ env.PROD_PROJECT }} -f docker-compose.prod.yml exec -T backend alembic upgrade head

      - name: Verify deployment
        run: |
          sleep 10
          docker compose -p ${{ env.PROD_PROJECT }} -f docker-compose.prod.yml ps
          curl -f http://localhost:8000/health

      - name: Deployment summary
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend:** http://localhost:3000" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend API:** http://localhost:8000" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
