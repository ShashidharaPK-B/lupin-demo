name: PR Checks

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-${{ github.head_ref }}
  cancel-in-progress: true

env:
  UV_IMAGE: ghcr.io/astral-sh/uv:python3.11-bookworm-slim
  NODE_IMAGE: node:20-alpine

jobs:
  pr-checks:
    name: PR Checks
    runs-on: self-hosted
    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Secret scanning ────────────────────────────────────
      - name: Secret scan (gitleaks)
        run: >
          docker run --rm
          -v "${env:GITHUB_WORKSPACE}:/repo" -w /repo
          ghcr.io/gitleaks/gitleaks:latest
          detect --source /repo --verbose

      # ── Backend lint ───────────────────────────────────────
      - name: Backend — lint
        run: >
          docker run --rm
          -v "${env:GITHUB_WORKSPACE}\backend:/app" -w /app
          ${{ env.UV_IMAGE }}
          sh -c "uv sync --quiet && uv run ruff check app/ tests/ && uv run ruff format --check app/ tests/"

      # ── Frontend lint ──────────────────────────────────────
      - name: Frontend — lint
        run: |
          $output = docker run --rm `
            -v "${env:GITHUB_WORKSPACE}\frontend:/app" -w /app `
            ${{ env.NODE_IMAGE }} `
            sh -c "npm ci --legacy-peer-deps --silent 2>&1 && npm run lint 2>&1"
          $exitCode = $LASTEXITCODE
          Write-Host $output
          $fence = '```'
          Add-Content $env:GITHUB_STEP_SUMMARY "## Frontend ESLint Summary"
          if ($exitCode -eq 0) {
            Add-Content $env:GITHUB_STEP_SUMMARY "All checks passed - no warnings or errors"
          } else {
            Add-Content $env:GITHUB_STEP_SUMMARY "Lint failed:"
            Add-Content $env:GITHUB_STEP_SUMMARY $fence
            Add-Content $env:GITHUB_STEP_SUMMARY $output
            Add-Content $env:GITHUB_STEP_SUMMARY $fence
            exit $exitCode
          }
