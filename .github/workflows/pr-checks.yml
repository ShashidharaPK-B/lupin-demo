name: Pre-merge Checks

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-${{ github.head_ref }}
  cancel-in-progress: true

env:
  UV_IMAGE: ghcr.io/astral-sh/uv:python3.11-bookworm-slim
  NODE_IMAGE: node:20-alpine

jobs:
  pre-merge:
    name: Pre-merge Checks
    runs-on: self-hosted
    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan (gitleaks)
        run: >
          docker run --rm
          -v "${env:GITHUB_WORKSPACE}:/repo" -w /repo
          ghcr.io/gitleaks/gitleaks:latest
          detect --source /repo --verbose

      - name: Lint (ruff + eslint)
        run: |
          docker run --rm `
            -v "${env:GITHUB_WORKSPACE}\backend:/app" -w /app `
            ${{ env.UV_IMAGE }} `
            sh -c "uv sync --quiet && uv run ruff check app/ tests/ && uv run ruff format --check app/ tests/"
          docker run --rm `
            -v "${env:GITHUB_WORKSPACE}\frontend:/app" -w /app `
            ${{ env.NODE_IMAGE }} `
            sh -c "npm ci --legacy-peer-deps --silent && npm run lint"

      - name: AI Code Review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_DEPLOYMENT_NAME: ${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
        run: python .github/scripts/ai-review.py
