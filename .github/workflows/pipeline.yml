name: CI/CD Pipeline

on:
  push:
    branches: [main]

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

env:
  PROD_PROJECT: lupin-prod
  DEV_PROJECT: lupin-demo
  UV_IMAGE: ghcr.io/astral-sh/uv:python3.11-bookworm-slim
  NODE_IMAGE: node:20-alpine

jobs:
  ci:
    name: CI — Lint & Test
    runs-on: self-hosted
    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Backend — lint
        run: >
          docker run --rm
          -v "${env:GITHUB_WORKSPACE}\app\backend:/app" -w /app
          ${{ env.UV_IMAGE }}
          sh -c "uv sync --quiet && uv run ruff check app/ tests/ && uv run ruff format --check app/ tests/"

      - name: Backend — start test DB & Redis
        run: |
          try { docker rm -f ci-postgres 2>&1 | Out-Null } catch {}
          try { docker rm -f ci-redis 2>&1 | Out-Null } catch {}
          docker run -d --name ci-postgres `
            -e POSTGRES_USER=user `
            -e POSTGRES_PASSWORD=password `
            -e POSTGRES_DB=shouldcost_test `
            -p 5433:5432 `
            postgres:16-alpine
          docker run -d --name ci-redis -p 6380:6379 redis:7-alpine
          for ($i = 1; $i -le 30; $i++) {
            try { docker exec ci-postgres pg_isready -U user 2>&1 | Out-Null } catch {}
            if ($LASTEXITCODE -eq 0) { break }
            Start-Sleep -Seconds 1
          }

      - name: Backend — test
        run: |
          $envFile = "$env:TEMP\ci-test.env"
          Set-Content $envFile @(
            "DATABASE_URL=postgresql+asyncpg://user:password@host.docker.internal:5433/shouldcost_test"
            "REDIS_URL=redis://host.docker.internal:6380/0"
            "AZURE_OPENAI_ENDPOINT=${{ secrets.AZURE_OPENAI_ENDPOINT }}"
            "AZURE_OPENAI_API_KEY=${{ secrets.AZURE_OPENAI_API_KEY }}"
            "AZURE_OPENAI_DEPLOYMENT_NAME=${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}"
            "AZURE_OPENAI_API_VERSION=${{ secrets.AZURE_OPENAI_API_VERSION }}"
            "SECRET_KEY=${{ secrets.SECRET_KEY }}"
            "UPLOAD_DIR=/tmp/uploads"
            'CORS_ORIGINS=["http://localhost:3000"]'
          ) -Encoding utf8
          docker run --rm `
            -v "${env:GITHUB_WORKSPACE}\app\backend:/app" -w /app `
            --env-file $envFile `
            ${{ env.UV_IMAGE }} `
            sh -c "uv sync --quiet && uv run pytest tests/ -v"
          Remove-Item $envFile -Force -ErrorAction SilentlyContinue

      - name: Backend — cleanup test DB & Redis
        if: always()
        run: |
          try { docker rm -f ci-postgres 2>&1 | Out-Null } catch {}
          try { docker rm -f ci-redis 2>&1 | Out-Null } catch {}

      - name: Frontend — lint
        run: |
          $output = docker run --rm `
            -v "${env:GITHUB_WORKSPACE}\app\frontend:/app" -w /app `
            ${{ env.NODE_IMAGE }} `
            sh -c "npm ci --legacy-peer-deps --silent 2>&1 && npm run lint 2>&1"
          $exitCode = $LASTEXITCODE
          Write-Host $output
          $fence = '```'
          Add-Content $env:GITHUB_STEP_SUMMARY "## Frontend ESLint Summary"
          if ($exitCode -eq 0) {
            Add-Content $env:GITHUB_STEP_SUMMARY "All checks passed - no warnings or errors"
          } else {
            Add-Content $env:GITHUB_STEP_SUMMARY "Lint failed:"
            Add-Content $env:GITHUB_STEP_SUMMARY $fence
            Add-Content $env:GITHUB_STEP_SUMMARY $output
            Add-Content $env:GITHUB_STEP_SUMMARY $fence
            exit $exitCode
          }

  deploy:
    name: Deploy
    runs-on: self-hosted
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        shell: powershell
        working-directory: app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write .env file
        run: |
          $content = @'
          ${{ secrets.ENV_FILE }}
          '@
          [System.IO.File]::WriteAllText(".env", $content.Trim())

      - name: Build and deploy
        run: |
          try { docker compose -p ${{ env.DEV_PROJECT }} down --remove-orphans 2>&1 | Out-Null } catch {}
          try { docker compose -p ${{ env.PROD_PROJECT }} -f docker-compose.prod.yml down --remove-orphans 2>&1 | Out-Null } catch {}
          docker compose -f docker-compose.prod.yml build
          docker compose -p ${{ env.PROD_PROJECT }} -f docker-compose.prod.yml up -d --remove-orphans

      - name: Verify deployment
        run: |
          Start-Sleep -Seconds 10
          docker compose -p ${{ env.PROD_PROJECT }} -f docker-compose.prod.yml ps
          try { curl -f http://localhost:8000/health } catch { Write-Host "Health check pending - containers starting" }
