name: CI/CD Pipeline

on:
  push:
    branches: [main]

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

env:
  PROD_PROJECT: lupin-prod
  DEV_PROJECT: lupin-demo
  UV_IMAGE: ghcr.io/astral-sh/uv:python3.11-bookworm-slim
  NODE_IMAGE: node:20-alpine

jobs:
  ci:
    name: CI
    runs-on: self-hosted
    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Step 1: Secret Scan ──
      - name: Secret scan (Gitleaks)
        run: |
          $VERSION = "8.21.2"
          $zip = "$env:TEMP\gitleaks.zip"
          Invoke-WebRequest -Uri "https://github.com/gitleaks/gitleaks/releases/download/v$VERSION/gitleaks_${VERSION}_windows_x64.zip" -OutFile $zip
          Expand-Archive $zip -DestinationPath "$env:TEMP\gitleaks" -Force
          & "$env:TEMP\gitleaks\gitleaks.exe" detect --source . --verbose --redact
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      # ── Step 2: Lint (Backend + Frontend) ──
      - name: Lint
        run: |
          Write-Host "=== Backend Lint (ruff) ==="
          docker run --rm `
            -v "${env:GITHUB_WORKSPACE}\app\backend:/app" -w /app `
            ${{ env.UV_IMAGE }} `
            sh -c "uv sync --quiet && uv run ruff check app/ tests/ && uv run ruff format --check app/ tests/"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          Write-Host ""
          Write-Host "=== Frontend Lint (ESLint) ==="
          docker run --rm `
            -v "${env:GITHUB_WORKSPACE}\app\frontend:/app" -w /app `
            ${{ env.NODE_IMAGE }} `
            sh -c "npm ci --legacy-peer-deps --silent 2>&1 && npm run lint 2>&1"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      # ── Step 3: Test ──
      - name: Test
        run: |
          try { docker rm -f ci-postgres 2>&1 | Out-Null } catch {}
          try { docker rm -f ci-redis 2>&1 | Out-Null } catch {}

          docker run -d --name ci-postgres `
            -e POSTGRES_USER=user `
            -e POSTGRES_PASSWORD=password `
            -e POSTGRES_DB=shouldcost_test `
            -p 5433:5432 `
            postgres:16-alpine
          docker run -d --name ci-redis -p 6380:6379 redis:7-alpine

          for ($i = 1; $i -le 30; $i++) {
            try { docker exec ci-postgres pg_isready -U user 2>&1 | Out-Null } catch {}
            if ($LASTEXITCODE -eq 0) { break }
            Start-Sleep -Seconds 1
          }

          $envFile = "$env:TEMP\ci-test.env"
          Set-Content $envFile @(
            "DATABASE_URL=postgresql+asyncpg://user:password@host.docker.internal:5433/shouldcost_test"
            "REDIS_URL=redis://host.docker.internal:6380/0"
            "AZURE_OPENAI_ENDPOINT=${{ secrets.AZURE_OPENAI_ENDPOINT }}"
            "AZURE_OPENAI_API_KEY=${{ secrets.AZURE_OPENAI_API_KEY }}"
            "AZURE_OPENAI_DEPLOYMENT_NAME=${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}"
            "AZURE_OPENAI_API_VERSION=${{ secrets.AZURE_OPENAI_API_VERSION }}"
            "SECRET_KEY=${{ secrets.SECRET_KEY }}"
            "UPLOAD_DIR=/tmp/uploads"
            'CORS_ORIGINS=["http://localhost:3000"]'
          ) -Encoding utf8

          docker run --rm `
            -v "${env:GITHUB_WORKSPACE}\app\backend:/app" -w /app `
            --env-file $envFile `
            ${{ env.UV_IMAGE }} `
            sh -c "uv sync --quiet && uv run pytest tests/ -v"
          $testExit = $LASTEXITCODE

          Remove-Item $envFile -Force -ErrorAction SilentlyContinue
          try { docker rm -f ci-postgres 2>&1 | Out-Null } catch {}
          try { docker rm -f ci-redis 2>&1 | Out-Null } catch {}

          if ($testExit -ne 0) { exit $testExit }

      # ── Step 4: SonarQube Scan ──
      - name: SonarQube scan
        run: |
          docker run --rm `
            -v "${env:GITHUB_WORKSPACE}:/usr/src" -w /usr/src `
            --add-host=host.docker.internal:host-gateway `
            ${{ env.NODE_IMAGE }} `
            sh -c "npm install -g @sonar/scan && sonar -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} -Dsonar.token=${{ secrets.SONAR_TOKEN }} -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} -Dsonar.sources=app/backend/app,app/frontend/src -Dsonar.exclusions=**/node_modules/**,**/.venv/**,**/dist/**,**/__pycache__/** -Dsonar.python.version=3.11"
          if ($LASTEXITCODE -ne 0) {
            Write-Host "SonarQube scan failed - check configuration"
            exit $LASTEXITCODE
          }

  deploy:
    name: Deploy
    runs-on: self-hosted
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        shell: powershell
        working-directory: app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write .env file
        run: |
          $content = @'
          ${{ secrets.ENV_FILE }}
          '@
          [System.IO.File]::WriteAllText(".env", $content.Trim())

      - name: Build and deploy
        run: |
          try { docker compose -p ${{ env.DEV_PROJECT }} down --remove-orphans 2>&1 | Out-Null } catch {}
          try { docker compose -p app down --remove-orphans 2>&1 | Out-Null } catch {}
          try { docker compose -p ${{ env.PROD_PROJECT }} -f docker-compose.prod.yml down --remove-orphans 2>&1 | Out-Null } catch {}
          docker compose -f docker-compose.prod.yml build
          docker compose -p ${{ env.PROD_PROJECT }} -f docker-compose.prod.yml up -d --remove-orphans

      - name: Verify deployment
        run: |
          Start-Sleep -Seconds 10
          docker compose -p ${{ env.PROD_PROJECT }} -f docker-compose.prod.yml ps
          try { curl -f http://localhost:8000/health } catch { Write-Host "Health check pending - containers starting" }
