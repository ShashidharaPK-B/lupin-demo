name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  PROD_PROJECT: lupin-prod
  DEV_PROJECT: lupin-demo

jobs:
  ci:
    name: CI — Lint, Test, Build
    runs-on: self-hosted
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Backend lint ──────────────────────────────────────────
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync

      - name: Backend lint (ruff check)
        working-directory: backend
        run: uv run ruff check app/ tests/

      - name: Backend lint (ruff format)
        working-directory: backend
        run: uv run ruff format --check app/ tests/

      # ── Backend test ──────────────────────────────────────────
      - name: Start test Postgres (port 5433)
        run: |
          docker rm -f ci-postgres 2>/dev/null || true
          docker run -d --name ci-postgres \
            -e POSTGRES_USER=user \
            -e POSTGRES_PASSWORD=password \
            -e POSTGRES_DB=shouldcost_test \
            -p 5433:5432 \
            postgres:16-alpine
          for i in $(seq 1 30); do
            docker exec ci-postgres pg_isready -U user && break || sleep 1
          done

      - name: Backend tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://user:password@localhost:5433/shouldcost_test
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_DEPLOYMENT_NAME: ${{ secrets.AZURE_OPENAI_DEPLOYMENT_NAME }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          UPLOAD_DIR: /tmp/uploads
          CORS_ORIGINS: '["http://localhost:3000"]'
        run: uv run pytest tests/ -v --cov=app --cov-report=term-missing

      - name: Stop test Postgres
        if: always()
        run: docker rm -f ci-postgres 2>/dev/null || true

      # ── Frontend lint ─────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

  deploy:
    name: Deploy to Self-Hosted Machine
    runs-on: self-hosted
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write .env file
        run: printf '%s' "${{ secrets.ENV_FILE }}" > .env

      # ── Build & push images ───────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/backend:latest
            ${{ env.REGISTRY }}/${{ github.repository }}/backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/frontend:latest
            ${{ env.REGISTRY }}/${{ github.repository }}/frontend:${{ github.sha }}
          build-args: |
            VITE_API_URL=
            VITE_APP_NAME=AI Should Cost Engine

      # ── Deploy ────────────────────────────────────────────────
      - name: Scale down dev stack (free ports)
        run: |
          docker compose -p ${{ env.DEV_PROJECT }} down --remove-orphans 2>/dev/null || true
          docker compose -p ${{ env.PROD_PROJECT }} -f docker-compose.prod.yml down --remove-orphans 2>/dev/null || true

      - name: Deploy with Docker Compose
        env:
          BACKEND_IMAGE: ${{ env.REGISTRY }}/${{ github.repository }}/backend:latest
          FRONTEND_IMAGE: ${{ env.REGISTRY }}/${{ github.repository }}/frontend:latest
        run: docker compose -p ${{ env.PROD_PROJECT }} -f docker-compose.prod.yml up -d --remove-orphans

      - name: Verify deployment
        run: |
          sleep 10
          docker compose -p ${{ env.PROD_PROJECT }} -f docker-compose.prod.yml ps
          curl -f http://localhost:8000/health

      - name: Deployment summary
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend:** http://localhost:3000" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend:** http://localhost:8000" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
